<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMQSync Test - Etapa 3</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      background: #fff;
      color: #111;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 3.5rem);
    }
    #status {
      white-space: pre-line;
      font-size: 1.05rem;
      margin-bottom: 16px;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    input {
      flex: 1 1 240px;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font: inherit;
    }
    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      font: inherit;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    #log {
      display: grid;
      gap: 8px;
      padding: 12px 0 0;
    }
    #log > div {
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      word-break: break-word;
    }
    .hint {
      margin: 0 0 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>AMQSync</h1>
  <p class="hint">Etapa 3: broadcast. As mensagens enviadas por um cliente aparecem para todos os clientes conectados.</p>
  <div id="status">Conectando...</div>

  <div class="row">
    <input id="messageInput" type="text" placeholder="Digite uma mensagem..." autocomplete="off" />
    <button id="sendButton" type="button">Enviar</button>
  </div>

  <div id="log"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
