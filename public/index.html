<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMQSync</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #121820;
      --border: #263241;
      --text: #e6edf3;
      --muted: #8ea0b2;
      --accent: #6ea8fe;
      --good: #4ade80;
      --bad: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 system-ui, sans-serif;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    input, button {
      border: 1px solid var(--border);
      background: #0f141b;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    input { min-width: 220px; }
    button { cursor: pointer; }
    button.primary { background: var(--accent); color: #07111f; border-color: transparent; font-weight: 700; }
    .status { margin: 14px 0; color: var(--muted); }
    .status b { color: var(--text); }
    .log {
      height: 60vh;
      overflow: auto;
      padding: 12px;
      background: #070a0e;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .entry { padding: 10px; border-bottom: 1px solid #1d2632; }
    .entry:last-child { border-bottom: 0; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; margin-right: 8px; font-size: 11px; }
    .good { color: var(--good); border: 1px solid rgba(74,222,128,.3); }
    .bad { color: var(--bad); border: 1px solid rgba(251,113,133,.3); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AMQSync</h1>
      <p class="muted">Console simples para validar o SongArtistMode via Socket.io.</p>

      <div class="row">
        <input id="serverUrl" value="http://localhost:3000" placeholder="http://localhost:3000" />
        <input id="roomId" value="global" placeholder="roomId" />
        <input id="playerName" value="Console" placeholder="nome" />
        <button id="connectBtn" class="primary">Conectar</button>
        <button id="clearBtn">Limpar</button>
      </div>

      <div class="status">Status: <b id="statusText">desconectado</b> · Socket: <b id="socketIdText">-</b> · Sala: <b id="roomText">global</b></div>

      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = $("log");
    const statusText = $("statusText");
    const socketIdText = $("socketIdText");
    const roomText = $("roomText");
    const connectBtn = $("connectBtn");
    const clearBtn = $("clearBtn");
    const serverUrl = $("serverUrl");
    const roomId = $("roomId");
    const playerName = $("playerName");

    let socket = null;

    function ts() {
      return new Date().toLocaleTimeString();
    }

    function write(tag, data, cls = "good") {
      const el = document.createElement("div");
      el.className = "entry";
      el.innerHTML = `<span class="tag ${cls}">${tag}</span> <span class="muted">${ts()}</span><div>${escapeHtml(JSON.stringify(data, null, 2))}</div>`;
      log.prepend(el);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function setStatus(text, color) {
      statusText.textContent = text;
      statusText.style.color = color === "good" ? "var(--good)" : color === "bad" ? "var(--bad)" : "var(--muted)";
    }

    function connect() {
  if (socket) {
    socket.disconnect();
    socket = null;
  }

  const roomIdValue = roomId.value.trim() || "global";
  const displayName = playerName.value.trim() || "Console Viewer";

  roomText.textContent = roomIdValue;
  setStatus("conectando...", "warn");

  socket = io({
    transports: ["websocket"]
  });

  socket.on("connect", () => {
    socket.emit("identify", {
      username: displayName,
      displayName,
      roomId: roomIdValue,
      userscript: "AMQSync Console",
      client: "browser",
      version: "console",
      teamNumber: 1
    });

    socket.emit("state:request");
    setStatus("conectado", "good");
    socketIdText.textContent = socket.id || "-";
    write("system", { socketId: socket.id, roomId: roomIdValue, displayName }, "good");
  });

  socket.on("disconnect", (reason) => {
    setStatus("desconectado", "bad");
    socketIdText.textContent = "-";
    write("disconnect", reason, "bad");
  });

  socket.on("identified", (packet) => {
    write("identified", packet, "warn");
  });

  socket.on("room:snapshot", (snapshot) => write("room:snapshot", snapshot, "warn"));
  socket.on("room:state", (snapshot) => write("room:state", snapshot, "warn"));
  socket.on("room:players", (players) => write("room:players", players, "warn"));
  socket.on("player:joined", (payload) => write("player:joined", payload, "good"));
  socket.on("player:left", (payload) => write("player:left", payload, "bad"));

  socket.onAny((event, payload) => {
    if (
      event === "connect" ||
      event === "disconnect" ||
      event === "identified" ||
      event === "room:snapshot" ||
      event === "room:state" ||
      event === "room:players" ||
      event === "player:joined" ||
      event === "player:left"
    ) {
      return;
    }

    write(event, payload, "good");
  });
}

    connectBtn.addEventListener("click", connect);
    clearBtn.addEventListener("click", () => log.innerHTML = "");
  </script>
</body>
</html>
