<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMQSync Test - Refatorado</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --panel: #fafafa;
      --line: #e7e7e7;
      --text: #111111;
      --muted: #555555;
      --accent: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 6vw, 3.5rem);
    }

    .hint {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    #status {
      white-space: pre-line;
      font-size: 1.05rem;
      margin-bottom: 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input {
      flex: 1 1 240px;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      font: inherit;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled,
    input:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #log {
      display: grid;
      gap: 8px;
      padding-top: 4px;
    }

    #log > div {
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      word-break: break-word;
    }

    #players {
      display: grid;
      gap: 8px;
    }

    .player,
    .empty {
      padding: 10px 12px;
      border: 1px solid #eaeaea;
      border-radius: 10px;
      background: #fff;
      white-space: pre-line;
      word-break: break-word;
    }

    .player strong {
      display: block;
      margin-bottom: 6px;
    }

    .empty {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>AMQSync</h1>
  <p class="hint">Refatoração: identificação do usuário, lista de conectados e chat separado de mensagem genérica.</p>

  <div class="grid">
    <section class="card">
      <h2>Chat</h2>
      <div id="status">Conectando...</div>

      <div class="row">
        <input id="messageInput" type="text" placeholder="Digite uma mensagem..." autocomplete="off" disabled />
        <button id="sendButton" type="button" disabled>Enviar</button>
      </div>

      <div id="log"></div>
    </section>

    <aside class="card">
      <h2>Conectados (<span id="playersCount">0</span>)</h2>
      <div id="players"></div>
    </aside>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
