<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMQSync Console</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #121820;
      --panel-2: #0f141b;
      --border: #263241;
      --text: #e6edf3;
      --muted: #8ea0b2;
      --accent: #6ea8fe;
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #fb7185;
      --line: #1d2632;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b0f14 0%, #070a0e 100%);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .card {
      background: rgba(18, 24, 32, 0.96);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .statusbar {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      background: rgba(15, 20, 27, 0.9);
    }

    .statusbar b {
      color: var(--text);
      font-weight: 600;
    }

    .input, .button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }

    .input {
      min-width: 220px;
    }

    .input:focus {
      border-color: var(--accent);
    }

    .button {
      cursor: pointer;
    }

    .button:hover {
      border-color: var(--accent);
    }

    .button.primary {
      background: var(--accent);
      color: #07111f;
      border-color: transparent;
      font-weight: 700;
    }

    .button.danger {
      background: transparent;
      border-color: #4c1d2d;
      color: #ffb4c0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr;
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 170px);
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
    }

    .panel-body {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .log {
      flex: 1;
      overflow: auto;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: #070a0e;
    }

    .entry {
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0b1016;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .entry .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    .tag.good { color: var(--good); }
    .tag.warn { color: var(--warn); }
    .tag.bad { color: var(--bad); }

    .side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kv {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .kv-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 8px;
    }

    .kv-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .kv-row span:first-child {
      color: var(--muted);
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .players {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .player {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #0b1016;
    }

    .player h3 {
      margin: 0 0 4px;
      font-size: 14px;
    }

    .player p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 500px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: flex-start;
      }

      .statusbar {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>AMQSync Console</h1>
        <p>Visualizador em tempo real dos eventos enviados pelo SongArtistMode.</p>
      </div>

      <div class="controls">
        <input id="roomInput" class="input" value="global" placeholder="roomId" />
        <input id="nameInput" class="input" value="Console Viewer" placeholder="nome" />
        <button id="connectBtn" class="button primary">Conectar</button>
        <button id="clearBtn" class="button">Limpar</button>
      </div>
    </div>

    <div class="card">
      <div class="statusbar">
        <div>Status: <b id="statusText">desconectado</b></div>
        <div>Socket: <b id="socketIdText">-</b></div>
        <div>Sala: <b id="roomText">global</b></div>
        <div>Eventos: <b id="countText">0</b></div>
      </div>

      <div class="grid">
        <div class="card panel">
          <div class="panel-head">
            <h2>Console de eventos</h2>
            <div class="small">use este painel para inspecionar tudo que chega do servidor</div>
          </div>
          <div class="panel-body">
            <div id="log" class="log"></div>
          </div>
        </div>

        <div class="side">
          <div class="card">
            <div class="panel-head">
              <h2>Último snapshot</h2>
            </div>
            <div class="kv" id="snapshotBox">
              <div class="small">aguardando dados...</div>
            </div>
          </div>

          <div class="card">
            <div class="panel-head">
              <h2>Jogadores</h2>
            </div>
            <div class="players" id="playersBox">
              <div class="small">nenhum jogador carregado</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const LOG_LIMIT = 80;

const VISIBLE_EVENTS = new Set([
  "draft:update",
  "answer:hash",
  "answer:submit",
  "answer:reveal",
  "hint:use",
  "score:update",
  "round:update",
  "player:joined",
  "player:left"
]);

const VISIBLE_SYSTEM = new Set([
  "connect",
  "disconnect",
  "identified"
]);

    const roomInput = $("roomInput");
    const nameInput = $("nameInput");
    const connectBtn = $("connectBtn");
    const clearBtn = $("clearBtn");
    const statusText = $("statusText");
    const socketIdText = $("socketIdText");
    const roomText = $("roomText");
    const countText = $("countText");
    const log = $("log");
    const snapshotBox = $("snapshotBox");
    const playersBox = $("playersBox");

    let socket = null;
    let eventCount = 0;

    function timeStamp() {
      return new Date().toLocaleTimeString();
    }

    function formatValue(value) {
      if (value === undefined) return "undefined";
      if (value === null) return "null";
      if (typeof value === "string") return value;
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function appendEntry(tag, title, payload, type = "good") {
  eventCount += 1;
  countText.textContent = String(eventCount);

  const entry = document.createElement("div");
  entry.className = "entry";

  entry.innerHTML = `
    <div class="meta">
      <span class="tag ${type}">${tag}</span>
      <span>${timeStamp()}</span>
      <span>${title}</span>
    </div>
    <div>${formatValue(payload)}</div>
  `;

  log.prepend(entry);

  while (log.children.length > LOG_LIMIT) {
    log.removeChild(log.lastElementChild);
  }

  log.scrollTop = 0;
}

    function setStatus(text, type = "good") {
      statusText.textContent = text;
      statusText.style.color = type === "bad" ? "var(--bad)" : type === "warn" ? "var(--warn)" : "var(--good)";
    }

    function renderSnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== "object") {
        snapshotBox.innerHTML = `<div class="small">snapshot vazio</div>`;
        return;
      }

      const rows = [
        ["roomId", snapshot.roomId],
        ["phase", snapshot.phase],
        ["roundKey", snapshot.roundKey],
        ["teamMode", snapshot.teamMode],
        ["playerCount", snapshot.playerCount],
        ["currentSong", snapshot.currentSong],
        ["currentArtist", snapshot.currentArtist],
        ["updatedAt", snapshot.updatedAt]
      ];

      snapshotBox.innerHTML = rows.map(([label, value]) => `
        <div class="kv-row">
          <span>${label}</span>
          <span>${formatValue(value)}</span>
        </div>
      `).join("");
    }

    function renderPlayers(players) {
      if (!Array.isArray(players) || players.length === 0) {
        playersBox.innerHTML = `<div class="small">nenhum jogador carregado</div>`;
        return;
      }

      playersBox.innerHTML = players.map((player) => `
        <div class="player">
          <h3>${player.displayName || player.username || player.playerKey || player.socketId}</h3>
          <p>playerKey: ${player.playerKey || "-"}</p>
          <p>team: ${player.teamNumber ?? 1} · room: ${player.roomId || "-"}</p>
          <p>socket: ${player.socketId || "-"}</p>
        </div>
      `).join("");
    }

    function connect() {
      if (socket) {
        socket.disconnect();
        socket = null;
      }

      const roomId = roomInput.value.trim() || "global";
      const displayName = nameInput.value.trim() || "Console Viewer";

      roomText.textContent = roomId;
      setStatus("conectando...", "warn");

      socket = io({
        transports: ["websocket"]
      });

      socket.on("connect", () => {
  socket.emit("identify", {
    username: displayName,
    displayName,
    roomId,
    userscript: "AMQSync Console",
    client: "browser",
    version: "console",
    teamNumber: 1
  });

  socket.emit("state:request");
  setStatus("conectado", "good");
  socketIdText.textContent = socket.id || "-";
  appendEntry("system", "connect", { socketId: socket.id, roomId, displayName }, "good");
});

socket.on("disconnect", (reason) => {
  setStatus("desconectado", "bad");
  socketIdText.textContent = "-";
  appendEntry("system", "disconnect", reason, "bad");
});

socket.on("identified", (packet) => {
  appendEntry("identified", "handshake", packet, "warn");
  if (packet?.room) {
    renderSnapshot(packet.room);
    renderPlayers(packet.room.players || []);
  }
});

socket.on("room:snapshot", (snapshot) => {
  renderSnapshot(snapshot);
  renderPlayers(snapshot.players || []);
});

socket.on("room:state", (snapshot) => {
  renderSnapshot(snapshot);
  renderPlayers(snapshot.players || []);
});

socket.on("room:players", (players) => {
  renderPlayers(players);
});

socket.on("player:joined", (payload) => {
  appendEntry("player:joined", "join", payload, "good");
});

socket.on("player:left", (payload) => {
  appendEntry("player:left", "leave", payload, "bad");
});

socket.onAny((event, payload) => {
  if (VISIBLE_SYSTEM.has(event) || VISIBLE_EVENTS.has(event)) {
    appendEntry(event, event, payload, "good");
  }
});

    connectBtn.addEventListener("click", connect);

    clearBtn.addEventListener("click", () => {
      log.innerHTML = "";
      eventCount = 0;
      countText.textContent = "0";
      appendEntry("system", "console cleared", {}, "warn");
    });

    roomInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") connect();
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") connect();
    });

    connect();
  </script>
</body>
</html>
